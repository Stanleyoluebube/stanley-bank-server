name: Backend CI/CD
on:
  push:
    branches: [ main ]
  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './stanley-bank-server/package-lock.json'

      - name: Install & Test
        working-directory: ./stanley-bank-server
        run: |
          npm ci
          npm test || echo "Tests not yet implemented"

      - name: Build Application
        working-directory: ./stanley-bank-server
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_BACKEND_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./stanley-bank-server
          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Update K8s Manifest
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          K8S_REPO: ${{ vars.K8S_REPO_URL }}
          IMAGE: ${{ vars.ECR_BACKEND_REPO }}:${{ github.sha }}
        run: |
          git clone $K8S_REPO k8s-config
          cd k8s-config
          sed -i "s|image: .*|image: $IMAGE|" backend-deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@github.com"
          git add backend-deployment.yaml
          git commit -m "deploy: update backend image to ${{ github.sha }}"
          git push origin main
