name: Backend CI/CD

on:
  push:
    branches: [main]

# Prevent overlapping deploys from a fast-pushed sequence of commits.
concurrency:
  group: backend-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  IMAGE_REPO: stanleybank/server
  K8S_MANIFEST: backend-deployment.yaml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install & test
        run: |
          npm ci
          npm test || echo "Tests not yet implemented"

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.IMAGE_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Update K8s manifest in k8s repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          K8S_REPO_URL: ${{ vars.K8S_REPO_URL }}
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
          MANIFEST: ${{ env.K8S_MANIFEST }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@${K8S_REPO_URL#https://}" k8s-config
          cd k8s-config

          sed -i "s|image: .*|image: ${IMAGE}|" "bank-project/${MANIFEST}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "bank-project/${MANIFEST}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "deploy(backend): ${IMAGE}"
          git push origin HEAD:main
